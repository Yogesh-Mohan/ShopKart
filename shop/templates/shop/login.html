{% extends 'shop/layout/main.html' %}

{% block title %}Login - ShopKart{% endblock title %}

{% block content %}
<div class="py-5" style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8 fade-up">
                <div class="custom-card border-0 bg-white p-4 p-md-5" style="border-radius: 30px;">
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-3" style="width: 80px; height: 80px;">
                            <i class="fa-solid fa-lock text-primary fs-1"></i>
                        </div>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Enter your credentials to access your account</p>
                    </div>

                    <form action="{% url 'login' %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fa-solid fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control bg-light border-0 py-3" required
                                    placeholder="Enter username" style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fa-solid fa-key text-muted"></i></span>
                                <input type="password" name="password" class="form-control bg-light border-0 py-3" required
                                    placeholder="Enter password" style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="small text-primary text-decoration-none">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow-lg mb-4">
                            Log In <i class="fa-solid fa-right-to-bracket ms-2"></i>
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="text-muted mb-0">Don't have an account? <a href="{% url 'register' %}"
                                class="text-primary text-decoration-none fw-bold">Sign up now</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
